<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BO3 Super EE Helper</title>
  <link rel="icon" type="image/svg+xml" href="assets/easter-egg.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      height: 100vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(191, 150, 109, 0.6) rgba(255, 255, 255, 0.04);
      background:
        radial-gradient(ellipse at 25% 50%, rgba(198,77,47,0.12) 0%, transparent 42%),
        radial-gradient(ellipse at 75% 50%, rgba(46,125,50,0.12)  0%, transparent 42%),
        linear-gradient(180deg, #161008 0%, #0d0907 55%, #080605 100%);
    }

    body::-webkit-scrollbar { width: 10px; }
    body::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.03); }
    body::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(211, 155, 61, 0.85), rgba(160, 100, 20, 0.8));
      border: 2px solid rgba(12, 8, 4, 0.9);
      border-radius: 999px;
    }
    body::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(245, 183, 50, 0.95), rgba(200, 134, 10, 0.9));
    }

    /* ── Layout ─────────────────────────────────────────────────── */
    .sel {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
      padding: 14px;
      gap: 14px;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .sel-hd {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .sel-hd__eyebrow {
      margin: 0;
      font-family: "Oswald", sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--warning);
    }

    .sel-hd__title {
      margin: 2px 0 0;
      font-family: "Oswald", sans-serif;
      font-size: clamp(1.6rem, 2.8vw, 3rem);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1;
      color: var(--text);
    }

    .sel-hd__rule {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 360px;
    }

    .sel-hd__rule-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    /* SVG diamond row ornament */
    .sel-hd__rule-gems {
      display: flex;
      gap: 6px;
    }

    .sel-hd__rule-gems span {
      display: block;
      width: 5px;
      height: 5px;
      background: var(--warning);
      clip-path: polygon(50% 0,100% 50%,50% 100%,0 50%);
      opacity: 0.7;
    }

    .sel-hd__rule-gems span:nth-child(2) {
      opacity: 1;
      width: 7px;
      height: 7px;
    }

    /* ── Map grid ────────────────────────────────────────────────── */
    .sel-maps {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
      min-height: 0;
    }

    .tile {
      min-height: 200px;
    }


    /* ── Tile base ───────────────────────────────────────────────── */
    .tile {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      clip-path: polygon(0 0, calc(100% - 28px) 0, 100% 28px, 100% 100%, 28px 100%, 0 calc(100% - 28px));
      transition: border-color 260ms ease, box-shadow 260ms ease;
    }

    .tile::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255,255,255,0.035);
      clip-path: inherit;
      pointer-events: none;
      z-index: 2;
    }

    /* Watermark number */
    .tile__num {
      position: absolute;
      top: 6px;
      right: 16px;
      font-family: "Oswald", sans-serif;
      font-size: clamp(4rem, 7vw, 8rem);
      line-height: 1;
      letter-spacing: -0.04em;
      opacity: 0.032;
      pointer-events: none;
      z-index: 0;
      color: var(--text);
    }

    /* Emblem */
    .tile__emblem {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 18px 0 10px;
      position: relative;
      z-index: 1;
    }

    .tile__emblem svg {
      width: min(60%, 260px);
      height: auto;
      transition: transform 300ms cubic-bezier(0.34,1.56,0.64,1), filter 300ms ease;
    }

    /* Info bar at bottom */
    .tile__info {
      width: 100%;
      padding: 16px 20px 18px;
      text-align: center;
      position: relative;
      z-index: 1;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .tile__tag {
      margin: 0 0 5px;
      font-family: "Oswald", sans-serif;
      font-size: 0.66rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .tile__name {
      margin: 0 0 12px;
      font-family: "Oswald", sans-serif;
      font-size: clamp(1.45rem, 2.4vw, 2.5rem);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 0.95;
    }

    .tile__cta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      font-family: "Oswald", sans-serif;
      font-size: 0.74rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.04);
      transition: border-color 180ms ease, background 180ms ease;
    }

    .tile__cta-arrow {
      display: inline-block;
      transition: transform 180ms ease;
    }

    /* ── GK tile ─────────────────────────────────────────────────── */
    .tile--gk {
      background:
        radial-gradient(ellipse at 50% 35%, rgba(198,77,47,0.22) 0%, transparent 55%),
        linear-gradient(175deg, rgba(42,12,8,1) 0%, rgba(16,7,5,1) 100%);
    }

    .tile--gk .tile__tag   { color: rgba(235,117,80,0.75); }
    .tile--gk .tile__emblem svg { color: rgba(235,117,80,0.9); }

    .tile--gk:hover {
      border-color: rgba(198,77,47,0.6);
      box-shadow: inset 0 0 100px rgba(198,77,47,0.07), 0 0 0 1px rgba(198,77,47,0.1);
    }
    .tile--gk:hover .tile__emblem svg {
      transform: translateY(-8px) scale(1.05);
      filter: drop-shadow(0 12px 28px rgba(198,77,47,0.55));
    }
    .tile--gk:hover .tile__cta {
      border-color: rgba(198,77,47,0.55);
      background: rgba(198,77,47,0.14);
    }

    /* ── ZNS tile ────────────────────────────────────────────────── */
    .tile--zns {
      background:
        radial-gradient(ellipse at 50% 35%, rgba(46,125,50,0.22) 0%, transparent 55%),
        linear-gradient(175deg, rgba(8,24,8,1) 0%, rgba(5,12,5,1) 100%);
    }

    .tile--zns .tile__tag   { color: rgba(102,187,106,0.75); }
    .tile--zns .tile__emblem svg { color: rgba(102,187,106,0.9); }

    .tile--zns:hover {
      border-color: rgba(102,187,106,0.6);
      box-shadow: inset 0 0 100px rgba(102,187,106,0.07), 0 0 0 1px rgba(102,187,106,0.1);
    }
    .tile--zns:hover .tile__emblem svg {
      transform: translateY(-8px) scale(1.05);
      filter: drop-shadow(0 12px 28px rgba(102,187,106,0.55));
    }
    .tile--zns:hover .tile__cta {
      border-color: rgba(102,187,106,0.55);
      background: rgba(102,187,106,0.14);
    }

    /* ── DE tile ─────────────────────────────────────────────────── */
    .tile--de {
      background:
        radial-gradient(ellipse at 50% 35%, rgba(40, 53, 147, 0.24) 0%, transparent 55%),
        linear-gradient(175deg, rgba(6, 8, 28, 1) 0%, rgba(4, 5, 18, 1) 100%);
    }

    .tile--de .tile__tag   { color: rgba(144, 202, 249, 0.75); }
    .tile--de .tile__emblem svg { color: rgba(144, 202, 249, 0.9); }

    .tile--de:hover {
      border-color: rgba(92, 107, 192, 0.6);
      box-shadow: inset 0 0 100px rgba(40, 53, 147, 0.08), 0 0 0 1px rgba(40, 53, 147, 0.1);
    }
    .tile--de:hover .tile__emblem svg {
      transform: translateY(-8px) scale(1.05);
      filter: drop-shadow(0 12px 28px rgba(92, 107, 192, 0.55));
    }
    .tile--de:hover .tile__cta {
      border-color: rgba(92, 107, 192, 0.55);
      background: rgba(92, 107, 192, 0.14);
    }

    /* ── SoE tile (gold/noir) ────────────────────────────────────── */
    .tile--soe {
      background:
        radial-gradient(ellipse at 50% 35%, rgba(200, 134, 10, 0.22) 0%, transparent 55%),
        linear-gradient(175deg, rgba(20, 12, 0, 1) 0%, rgba(12, 7, 0, 1) 100%);
    }

    .tile--soe .tile__tag   { color: rgba(245, 183, 50, 0.75); }
    .tile--soe .tile__emblem svg { color: rgba(245, 183, 50, 0.9); }

    .tile--soe:hover {
      border-color: rgba(200, 134, 10, 0.6);
      box-shadow: inset 0 0 100px rgba(200, 134, 10, 0.08), 0 0 0 1px rgba(200, 134, 10, 0.1);
    }
    .tile--soe:hover .tile__emblem svg {
      transform: translateY(-8px) scale(1.05);
      filter: drop-shadow(0 12px 28px rgba(245, 183, 50, 0.5));
    }
    .tile--soe:hover .tile__cta {
      border-color: rgba(200, 134, 10, 0.55);
      background: rgba(200, 134, 10, 0.14);
    }

    /* ── REV tile (deep purple) ──────────────────────────────────── */
    .tile--rev {
      grid-column: span 2;
      flex-direction: row;
      align-items: stretch;
      background:
        radial-gradient(ellipse at 30% 50%, rgba(92, 27, 150, 0.28) 0%, transparent 55%),
        linear-gradient(175deg, rgba(12, 6, 22, 1) 0%, rgba(7, 4, 14, 1) 100%);
    }

    .tile--rev .tile__emblem {
      flex-shrink: 0;
      width: 50%;
      align-self: stretch;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
    }

    .tile--rev .tile__info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 28px;
      text-align: left;
      border-top: none;
      border-left: 1px solid rgba(150, 70, 210, 0.15);
    }

    .tile--rev .tile__num {
      position: absolute;
      top: 14px;
      right: 18px;
    }

    .tile--rev .tile__tag   { color: rgba(206, 147, 216, 0.75); }
    .tile--rev .tile__emblem svg { color: rgba(200, 140, 240, 0.9); }

    .tile--rev:hover {
      border-color: rgba(156, 61, 208, 0.6);
      box-shadow: inset 0 0 140px rgba(92, 27, 150, 0.09), 0 0 0 1px rgba(92, 27, 150, 0.1);
    }
    .tile--rev:hover .tile__emblem svg {
      transform: translateY(-4px) scale(1.04) rotate(12deg);
      filter: drop-shadow(0 10px 32px rgba(156, 61, 208, 0.6));
    }
    .tile--rev:hover .tile__cta {
      border-color: rgba(156, 61, 208, 0.55);
      background: rgba(156, 61, 208, 0.14);
    }

    .tile:hover .tile__cta-arrow { transform: translateX(4px); }

    /* ── Short viewport — compress info bars ─────────────────────── */
    @media (max-height: 720px) {
      .tile__info { padding: 10px 16px 12px; }
      .tile__name { font-size: clamp(1.1rem, 1.8vw, 1.8rem); margin-bottom: 8px; }
      .tile__cta  { padding: 5px 12px; font-size: 0.68rem; }
      .tile__emblem { padding: 10px 0 6px; }
      .sel { gap: 10px; padding: 10px; }
      .sel-maps { gap: 8px; }
      .sel-hd__title { font-size: clamp(1.2rem, 2.2vw, 2.2rem); }
    }

    /* ── Narrow viewport — two column then single ───────────────── */
    @media (max-width: 760px) {
      .sel-maps { grid-template-columns: 1fr 1fr; grid-template-rows: unset; }
      .tile--rev { grid-column: 1 / -1; flex-direction: row; }
    }

    @media (max-width: 520px) {
      .sel-maps { grid-template-columns: 1fr; }
      .tile--rev {
        grid-column: unset;
        flex-direction: column;
        align-items: center;
      }
      .tile--rev .tile__emblem { width: 100%; align-self: unset; }
      .tile--rev .tile__info   { align-items: center; text-align: center; padding-left: 20px; }
    }
  </style>
</head>
<body>
  <div class="sel">

    <header class="sel-hd">
      <p class="sel-hd__eyebrow">Black Ops 3</p>
      <h1 class="sel-hd__title">BO3 Super EE Helper</h1>
      <div class="sel-hd__rule">
        <span class="sel-hd__rule-line"></span>
        <div class="sel-hd__rule-gems"><span></span><span></span><span></span></div>
        <span class="sel-hd__rule-line"></span>
      </div>
    </header>

    <div class="sel-maps">

      <!-- ── Shadows of Evil ────────────────────────────────────────── -->
      <a href="soe.html" class="tile tile--soe">
        <span class="tile__num" aria-hidden="true">01</span>

        <div class="tile__emblem">
          <!--
            Apothicon Servant orb — bioluminescent sphere with organic
            spiral veins converging on a central eye. 260×260 viewBox.
          -->
          <svg viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg"
               fill="currentColor" aria-label="Shadows of Evil Apothicon Servant emblem">

            <!-- ── Orb body ── -->
            <circle cx="130" cy="130" r="118" opacity="0.14"/>
            <circle cx="130" cy="130" r="118" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.62"/>
            <circle cx="130" cy="130" r="106" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.14"/>

            <!-- ── Background concentric texture rings (offset toward eye) ── -->
            <circle cx="118" cy="112" r="80" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.1"/>
            <circle cx="118" cy="112" r="50" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.09"/>
            <circle cx="118" cy="112" r="26" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.08"/>

            <!-- ── Primary spiral veins (thick) ── -->
            <!-- All veins curve consistently counter-clockwise as they spread outward -->

            <!-- North arm -->
            <path d="M 120 100 C 118 80  110 58  96 32"
                  fill="none" stroke="currentColor" stroke-width="3"   stroke-linecap="round" opacity="0.72"/>
            <!-- Branch off north arm -->
            <path d="M 112 72 C 100 66  84  68  68 76"
                  fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.44"/>

            <!-- NE arm -->
            <path d="M 128 98 C 142 78  162 58  190 40"
                  fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" opacity="0.65"/>
            <path d="M 132 96 C 150 78  172 64  200 54"
                  fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity="0.42"/>

            <!-- East arm -->
            <path d="M 136 110 C 160 106  186 100  222 96"
                  fill="none" stroke="currentColor" stroke-width="3"   stroke-linecap="round" opacity="0.68"/>
            <path d="M 136 118 C 162 118  190 120  224 124"
                  fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
            <!-- Branch off east arm -->
            <path d="M 184 102 C 194 90  206 82  216 70"

            <!-- SE arm -->
            <path d="M 128 124 C 148 144  168 166  186 200"
                  fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" opacity="0.65"/>
            <path d="M 132 126 C 154 148  178 170  202 202"
                  fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity="0.4"/>

            <!-- South arm -->
            <path d="M 118 126 C 116 150  112 178  108 216"
                  fill="none" stroke="currentColor" stroke-width="3"   stroke-linecap="round" opacity="0.7"/>
            <path d="M 122 128 C 124 152  128 180  132 218"
                  fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.42"/>
            <!-- Branch off south arm -->
            <path d="M 112 170 C 98  180  82  184  64 186"
                  fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.32"/>

            <!-- SW arm -->
            <path d="M 108 120 C 86  136  62  156  38 182"
                  fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" opacity="0.62"/>
            <path d="M 106 116 C 82  130  58  146  32 164"
                  fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity="0.38"/>

            <!-- West arm -->
            <path d="M 102 110 C 78  106  52  100  20 96"
                  fill="none" stroke="currentColor" stroke-width="3"   stroke-linecap="round" opacity="0.68"/>
            <path d="M 102 116 C 76  118  50  120  18 124"
                  fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
            <!-- Branch off west arm — curls up toward NW -->
            <path d="M 56 104 C 48  90   44  74   46 56"
                  fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.32"/>

            <!-- NW arm -->
            <path d="M 108 100 C 90  82   68  62   44 44"
                  fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" opacity="0.62"/>

            <!-- ── Secondary micro-veins (texture density) ── -->
            <path d="M 124 104 C 128 88  136 72  148 52"
                  fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
            <path d="M 114 104 C 104 88  90  76  72  60"
                  fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
            <path d="M 130 120 C 140 130  152 148  162 172"
                  fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
            <path d="M 112 122 C 100 134  84  150  66 170"
                  fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>

            <!-- ── Central open circle with glow ── -->
            <circle cx="118" cy="108" r="22" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.9"/>
            <circle cx="118" cy="108" r="22" fill="none" stroke="currentColor" stroke-width="8" opacity="0.12"/>
            <circle cx="118" cy="108" r="22" fill="none" stroke="currentColor" stroke-width="18" opacity="0.06"/>

            <!-- ── Bioluminescent particle dots ── -->
            <circle cx="86"  cy="48"  r="2.5" opacity="0.55"/>
            <circle cx="164" cy="42"  r="2"   opacity="0.48"/>
            <circle cx="206" cy="84"  r="2.5" opacity="0.52"/>
            <circle cx="226" cy="146" r="2"   opacity="0.4"/>
            <circle cx="198" cy="208" r="2.5" opacity="0.48"/>
            <circle cx="136" cy="238" r="2"   opacity="0.42"/>
            <circle cx="70"  cy="222" r="2.5" opacity="0.5"/>
            <circle cx="32"  cy="158" r="2"   opacity="0.38"/>
            <circle cx="34"  cy="84"  r="2.5" opacity="0.45"/>
            <circle cx="54"  cy="38"  r="1.5" opacity="0.35"/>
            <circle cx="192" cy="46"  r="1.5" opacity="0.35"/>
            <circle cx="240" cy="118" r="1.5" opacity="0.3"/>
            <circle cx="152" cy="244" r="1.5" opacity="0.3"/>

          </svg>
        </div>

        <div class="tile__info">
          <h2 class="tile__name">Shadows of Evil</h2>
          <span class="tile__cta">Open Manual <span class="tile__cta-arrow">→</span></span>
        </div>
      </a>

      <!-- ── Der Eisendrache ───────────────────────────────────────── -->
      <a href="dere.html" class="tile tile--de">
        <span class="tile__num" aria-hidden="true">02</span>

        <div class="tile__emblem">
          <svg viewBox="0 0 270 280" xmlns="http://www.w3.org/2000/svg"
               fill="currentColor" aria-label="Der Eisendrache castle and bow emblem">
            <rect x="30" y="140" width="210" height="110" rx="2" opacity="0.6"/>
            <path d="M 108 250 L 108 192 C 108 180 122 170 135 170 C 148 170 162 180 162 192 L 162 250 Z" fill="var(--bg, #06080f)"/>
            <rect x="20"  y="90" width="50" height="160" rx="2"/>
            <rect x="20"  y="74" width="12" height="22" rx="1"/>
            <rect x="38"  y="74" width="12" height="22" rx="1"/>
            <rect x="56"  y="74" width="12" height="22" rx="1"/>
            <rect x="200" y="90" width="50" height="160" rx="2"/>
            <rect x="200" y="74" width="12" height="22" rx="1"/>
            <rect x="218" y="74" width="12" height="22" rx="1"/>
            <rect x="236" y="74" width="12" height="22" rx="1"/>
            <rect x="100" y="60" width="70" height="90" rx="2"/>
            <rect x="100" y="44" width="12" height="22" rx="1"/>
            <rect x="119" y="44" width="12" height="22" rx="1"/>
            <rect x="138" y="44" width="12" height="22" rx="1"/>
            <rect x="157" y="44" width="12" height="22" rx="1"/>
            <path d="M 122 108 L 122 80 C 122 72 135 68 135 68 C 135 68 148 72 148 80 L 148 108 Z" fill="var(--bg, #06080f)" opacity="0.9"/>
            <path d="M 135 16 C 94 32 74 68 76 110 C 76 148 96 176 135 192 C 174 176 194 148 194 110 C 196 68 176 32 135 16 Z" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
            <line x1="135" y1="16" x2="135" y2="192" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.55"/>
            <line x1="90" y1="104" x2="175" y2="104" stroke="currentColor" stroke-width="2" opacity="0.8"/>
            <path d="M 175 104 L 165 98 L 165 110 Z" opacity="0.8"/>
            <path d="M 90 104 L 98 98 L 100 104 L 98 110 Z" opacity="0.55"/>
            <circle cx="135" cy="140" r="126" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.1"/>
