<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BO3 Super EE Helper</title>
  <link rel="icon" type="image/svg+xml" href="assets/easter-egg.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      overflow: hidden;
      height: 100vh;
      background:
        radial-gradient(ellipse at 25% 50%, rgba(198,77,47,0.12) 0%, transparent 42%),
        radial-gradient(ellipse at 75% 50%, rgba(46,125,50,0.12)  0%, transparent 42%),
        linear-gradient(180deg, #161008 0%, #0d0907 55%, #080605 100%);
    }

    /* ── Layout ─────────────────────────────────────────────────── */
    .sel {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
      padding: 14px;
      gap: 14px;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .sel-hd {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .sel-hd__eyebrow {
      margin: 0;
      font-family: "Oswald", sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--warning);
    }

    .sel-hd__title {
      margin: 2px 0 0;
      font-family: "Oswald", sans-serif;
      font-size: clamp(1.6rem, 2.8vw, 3rem);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1;
      color: var(--text);
    }

    .sel-hd__rule {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 360px;
    }

    .sel-hd__rule-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    /* SVG diamond row ornament */
    .sel-hd__rule-gems {
      display: flex;
      gap: 6px;
    }

    .sel-hd__rule-gems span {
      display: block;
      width: 5px;
      height: 5px;
      background: var(--warning);
      clip-path: polygon(50% 0,100% 50%,50% 100%,0 50%);
      opacity: 0.7;
    }

    .sel-hd__rule-gems span:nth-child(2) {
      opacity: 1;
      width: 7px;
      height: 7px;
    }

    /* ── Map grid ────────────────────────────────────────────────── */
    .sel-maps {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      min-height: 0;
    }

    /* ── Tile base ───────────────────────────────────────────────── */
    .tile {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      clip-path: polygon(0 0, calc(100% - 28px) 0, 100% 28px, 100% 100%, 28px 100%, 0 calc(100% - 28px));
      transition: border-color 260ms ease, box-shadow 260ms ease;
    }

    .tile::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255,255,255,0.035);
      clip-path: inherit;
      pointer-events: none;
      z-index: 2;
    }

    /* Watermark number */
    .tile__num {
      position: absolute;
      top: 6px;
      right: 16px;
      font-family: "Oswald", sans-serif;
      font-size: clamp(4rem, 7vw, 8rem);
      line-height: 1;
      letter-spacing: -0.04em;
      opacity: 0.032;
      pointer-events: none;
      z-index: 0;
      color: var(--text);
    }

    /* Emblem */
    .tile__emblem {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 18px 0 10px;
      position: relative;
      z-index: 1;
    }

    .tile__emblem svg {
      width: min(60%, 260px);
      height: auto;
      transition: transform 300ms cubic-bezier(0.34,1.56,0.64,1), filter 300ms ease;
    }

    /* Info bar at bottom */
    .tile__info {
      width: 100%;
      padding: 16px 20px 18px;
      text-align: center;
      position: relative;
      z-index: 1;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .tile__tag {
      margin: 0 0 5px;
      font-family: "Oswald", sans-serif;
      font-size: 0.66rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .tile__name {
      margin: 0 0 12px;
      font-family: "Oswald", sans-serif;
      font-size: clamp(1.45rem, 2.4vw, 2.5rem);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 0.95;
    }

    .tile__cta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      font-family: "Oswald", sans-serif;
      font-size: 0.74rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.04);
      transition: border-color 180ms ease, background 180ms ease;
    }

    .tile__cta-arrow {
      display: inline-block;
      transition: transform 180ms ease;
    }

    /* ── GK tile ─────────────────────────────────────────────────── */
    .tile--gk {
      background:
        radial-gradient(ellipse at 50% 35%, rgba(198,77,47,0.22) 0%, transparent 55%),
        linear-gradient(175deg, rgba(42,12,8,1) 0%, rgba(16,7,5,1) 100%);
    }

    .tile--gk .tile__tag   { color: rgba(235,117,80,0.75); }
    .tile--gk .tile__emblem svg { color: rgba(235,117,80,0.9); }

    .tile--gk:hover {
      border-color: rgba(198,77,47,0.6);
      box-shadow: inset 0 0 100px rgba(198,77,47,0.07), 0 0 0 1px rgba(198,77,47,0.1);
    }
    .tile--gk:hover .tile__emblem svg {
      transform: translateY(-8px) scale(1.05);
      filter: drop-shadow(0 12px 28px rgba(198,77,47,0.55));
    }
    .tile--gk:hover .tile__cta {
      border-color: rgba(198,77,47,0.55);
      background: rgba(198,77,47,0.14);
    }

    /* ── ZNS tile ────────────────────────────────────────────────── */
    .tile--zns {
      background:
        radial-gradient(ellipse at 50% 35%, rgba(46,125,50,0.22) 0%, transparent 55%),
        linear-gradient(175deg, rgba(8,24,8,1) 0%, rgba(5,12,5,1) 100%);
    }

    .tile--zns .tile__tag   { color: rgba(102,187,106,0.75); }
    .tile--zns .tile__emblem svg { color: rgba(102,187,106,0.9); }

    .tile--zns:hover {
      border-color: rgba(102,187,106,0.6);
      box-shadow: inset 0 0 100px rgba(102,187,106,0.07), 0 0 0 1px rgba(102,187,106,0.1);
    }
    .tile--zns:hover .tile__emblem svg {
      transform: translateY(-8px) scale(1.05);
      filter: drop-shadow(0 12px 28px rgba(102,187,106,0.55));
    }
    .tile--zns:hover .tile__cta {
      border-color: rgba(102,187,106,0.55);
      background: rgba(102,187,106,0.14);
    }

    .tile:hover .tile__cta-arrow { transform: translateX(4px); }

    @media (max-width: 580px) {
      .sel-maps { grid-template-columns: 1fr; }
      body { overflow-y: auto; height: auto; }
      .sel { height: auto; overflow: visible; }
    }
  </style>
</head>
<body>
  <div class="sel">

    <header class="sel-hd">
      <p class="sel-hd__eyebrow">Black Ops 3</p>
      <h1 class="sel-hd__title">BO3 Super EE Helper</h1>
      <div class="sel-hd__rule">
        <span class="sel-hd__rule-line"></span>
        <div class="sel-hd__rule-gems"><span></span><span></span><span></span></div>
        <span class="sel-hd__rule-line"></span>
      </div>
    </header>

    <div class="sel-maps">

      <!-- ── Gorod Krovi ─────────────────────────────────────────── -->
      <a href="/gorod" class="tile tile--gk">
        <span class="tile__num" aria-hidden="true">01</span>

        <div class="tile__emblem">
          <!--
            Heraldic dragon displayed (wings spread, facing viewer).
            Drawn in a 260×280 viewBox. All shapes use currentColor
            so the tile's CSS controls the colour.
          -->
          <svg viewBox="0 0 260 280" xmlns="http://www.w3.org/2000/svg"
               fill="currentColor" aria-label="Gorod Krovi dragon emblem">

            <!-- ── Left wing ── -->
            <path d="
              M 118 132
              C 98 112  68 84  32 52
              C 18 40  8 44  12 58
              C 16 66  28 70  36 74
              C 22 78   8 84   4 96
              C 18 94  34 92  46 100
              C 34 108 18 116  14 130
              C 32 126 52 122  66 130
              C 54 140 38 150  34 162
              C 52 152 72 144  86 150
              L 104 140
              Z
            "/>

            <!-- ── Right wing (mirror) ── -->
            <path d="
              M 142 132
              C 162 112 192 84  228 52
              C 242 40  252 44  248 58
              C 244 66  232 70  224 74
              C 238 78  252 84  256 96
              C 242 94  226 92  214 100
              C 226 108 242 116 246 130
              C 228 126 208 122 194 130
              C 206 140 222 150 226 162
              C 208 152 188 144 174 150
              L 156 140
              Z
            "/>

            <!-- ── Body ── -->
            <ellipse cx="130" cy="168" rx="30" ry="26"/>

            <!-- ── Neck ── -->
            <path d="
              M 108 150
              C 104 136 106 120 110 108
              L 150 108
              C 154 120 156 136 152 150
              Z
            "/>

            <!-- ── Head ── -->
            <path d="
              M 108 108
              C 106 90  112 72  120 64
              C 124 59  130 57  130 57
              C 130 57  136 59  140 64
              C 148 72  154 90  152 108
              Z
            "/>

            <!-- ── Left horn ── -->
            <path d="M 120 66 C 112 50 106 36 104 20 C 108 34 114 50 120 64 Z"/>

            <!-- ── Right horn ── -->
            <path d="M 140 66 C 148 50 154 36 156 20 C 152 34 146 50 140 64 Z"/>

            <!-- ── Eyes ── -->
            <circle cx="120" cy="88" r="5.5" fill="var(--bg,#0d0907)"/>
            <circle cx="120" cy="88" r="2.5"/>
            <circle cx="140" cy="88" r="5.5" fill="var(--bg,#0d0907)"/>
            <circle cx="140" cy="88" r="2.5"/>

            <!-- ── Left leg + claw ── -->
            <path d="
              M 112 188
              L 100 210  L 94 224  L 104 218  L 102 232
              L 112 224  L 110 238  L 120 228  L 118 240
              L 126 228
              Z
            "/>

            <!-- ── Right leg + claw ── -->
            <path d="
              M 148 188
              L 160 210  L 166 224  L 156 218  L 158 232
              L 148 224  L 150 238  L 140 228  L 142 240
              L 134 228
              Z
            "/>

            <!-- ── Left tail fork ── -->
            <path d="
              M 116 188
              C 108 200 102 214 106 226
              C 110 218 114 206 116 196
              C 114 208 112 222 114 232
              C 119 222 122 208 122 196
              Z
            "/>

            <!-- ── Right tail fork ── -->
            <path d="
              M 144 188
              C 152 200 158 214 154 226
              C 150 218 146 206 144 196
              C 146 208 148 222 146 232
              C 141 222 138 208 138 196
              Z
            "/>

            <!-- ── Decorative ring (subtle) ── -->
            <circle cx="130" cy="130" r="118"
                    fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.18"/>
            <circle cx="130" cy="130" r="124"
                    fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.08"/>

            <!-- ── Eight notch marks on ring ── -->
            <g opacity="0.3" stroke="currentColor" stroke-width="2">
              <line x1="130" y1="4"   x2="130" y2="14"/>
              <line x1="130" y1="246" x2="130" y2="256"/>
              <line x1="4"   y1="130" x2="14"  y2="130"/>
              <line x1="246" y1="130" x2="256" y2="130"/>
              <line x1="47"  y1="47"  x2="54"  y2="54"/>
              <line x1="206" y1="206" x2="213" y2="213"/>
              <line x1="213" y1="47"  x2="206" y2="54"/>
              <line x1="54"  y1="206" x2="47"  y2="213"/>
            </g>

          </svg>
        </div>

        <div class="tile__info">
          <h2 class="tile__name">Gorod Krovi</h2>
          <span class="tile__cta">Open Manual <span class="tile__cta-arrow">→</span></span>
        </div>
      </a>

      <!-- ── Zetsubou No Shima ───────────────────────────────────── -->
      <a href="/zetsubou" class="tile tile--zns">
        <span class="tile__num" aria-hidden="true">02</span>

        <div class="tile__emblem">
          <!--
            Torii gate with spore vines and leaf growth.
            Drawn in a 220×280 viewBox.
          -->
          <svg viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg"
               fill="currentColor" aria-label="Zetsubou no Shima torii emblem">

            <!-- ── Torii: left post ── -->
            <rect x="64"  y="96"  width="18" height="164" rx="2"/>

            <!-- ── Torii: right post ── -->
            <rect x="138" y="96"  width="18" height="164" rx="2"/>

            <!-- ── Torii: upper shimaki caps ── -->
            <rect x="54"  y="90"  width="38" height="11"  rx="1"/>
            <rect x="128" y="90"  width="38" height="11"  rx="1"/>

            <!-- ── Torii: kasagi (top beam, curved ends) ── -->
            <path d="M 12 58 C 110 40 110 40 208 58 L 208 78 C 110 60 110 60 12 78 Z"/>

            <!-- ── Torii: nuki (second cross-beam) ── -->
            <rect x="64"  y="114" width="92" height="13"  rx="1"/>

            <!-- ── Left vine, main stem ── -->
            <path d="M 68 220 C 56 210 44 204 32 208 C 20 212 14 222 16 232"
                  fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
            <path d="M 52 212 C 46 200 44 186 50 174"
                  fill="none" stroke="currentColor" stroke-width="3"   stroke-linecap="round"/>
            <path d="M 50 192 C 40 188 28 192 20 202"
                  fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M 44 176 C 34 170 24 172 16 180"
                  fill="none" stroke="currentColor" stroke-width="2"   stroke-linecap="round"/>
            <!-- Left vine climb up post -->
            <path d="M 66 198 C 60 184 62 168 68 154 C 64 142 62 128 66 116"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

            <!-- ── Right vine, main stem ── -->
            <path d="M 152 220 C 164 210 176 204 188 208 C 200 212 206 222 204 232"
                  fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
            <path d="M 168 212 C 174 200 176 186 170 174"
                  fill="none" stroke="currentColor" stroke-width="3"   stroke-linecap="round"/>
            <path d="M 170 192 C 180 188 192 192 200 202"
                  fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M 176 176 C 186 170 196 172 204 180"
                  fill="none" stroke="currentColor" stroke-width="2"   stroke-linecap="round"/>
            <!-- Right vine climb up post -->
            <path d="M 154 198 C 160 184 158 168 152 154 C 156 142 158 128 154 116"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

            <!-- ── Leaves (ellipses rotated around vines) ── -->
            <ellipse cx="18"  cy="232" rx="12" ry="5.5" transform="rotate(-28 18 232)"  opacity="0.85"/>
            <ellipse cx="28"  cy="202" rx="10" ry="4.5" transform="rotate(18 28 202)"   opacity="0.85"/>
            <ellipse cx="16"  cy="182" rx="9"  ry="4"   transform="rotate(-12 16 182)"  opacity="0.75"/>
            <ellipse cx="48"  cy="174" rx="11" ry="4.5" transform="rotate(25 48 174)"   opacity="0.8"/>

            <ellipse cx="202" cy="232" rx="12" ry="5.5" transform="rotate(28 202 232)"  opacity="0.85"/>
            <ellipse cx="192" cy="202" rx="10" ry="4.5" transform="rotate(-18 192 202)" opacity="0.85"/>
            <ellipse cx="204" cy="182" rx="9"  ry="4"   transform="rotate(12 204 182)"  opacity="0.75"/>
            <ellipse cx="172" cy="174" rx="11" ry="4.5" transform="rotate(-25 172 174)" opacity="0.8"/>

            <!-- A few small pointed leaf tips -->
            <path d="M 36 208 C 30 200 26 192 28 184 C 34 194 38 204 36 208 Z" opacity="0.7"/>
            <path d="M 184 208 C 190 200 194 192 192 184 C 186 194 182 204 184 208 Z" opacity="0.7"/>

            <!-- ── Spore clusters ── -->
            <circle cx="22"  cy="192" r="4.5" opacity="0.65"/>
            <circle cx="34"  cy="186" r="3"   opacity="0.5"/>
            <circle cx="14"  cy="198" r="2.5" opacity="0.4"/>
            <circle cx="26"  cy="178" r="2"   opacity="0.35"/>

            <circle cx="198" cy="192" r="4.5" opacity="0.65"/>
            <circle cx="186" cy="186" r="3"   opacity="0.5"/>
            <circle cx="206" cy="198" r="2.5" opacity="0.4"/>
            <circle cx="194" cy="178" r="2"   opacity="0.35"/>

            <!-- Tiny spore dots on kasagi beam -->
            <circle cx="60"  cy="66"  r="2.5" opacity="0.4"/>
            <circle cx="80"  cy="62"  r="2"   opacity="0.3"/>
            <circle cx="160" cy="62"  r="2"   opacity="0.3"/>
            <circle cx="178" cy="66"  r="2.5" opacity="0.4"/>

            <!-- ── Subtle ground ring ── -->
            <ellipse cx="110" cy="260" rx="72" ry="8"
                     fill="none" stroke="currentColor" stroke-width="1" opacity="0.15"/>

          </svg>
        </div>

        <div class="tile__info">
          <h2 class="tile__name">Zetsubou No Shima</h2>
          <span class="tile__cta">Open Manual <span class="tile__cta-arrow">→</span></span>
        </div>
      </a>

    </div>
  </div>
</body>
</html>
